<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Regtransfers - Personal Number Plates">
  <!-- Outer yellow plate background -->
  <rect x="0" y="0" width="320" height="80" rx="6" ry="6" fill="#F5C100"/>

  <!-- Dark navy inner border frame -->
  <rect x="4" y="4" width="312" height="72" rx="4" ry="4" fill="none" stroke="#1a3060" stroke-width="3"/>

  <!-- "Est 1982" badge — top left -->
  <rect x="12" y="10" width="52" height="30" rx="3" ry="3" fill="#1a3060"/>
  <text x="38" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#F5C100" font-weight="bold" letter-spacing="0.5">Est</text>
  <text x="38" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff" font-weight="bold" letter-spacing="0.5">1982</text>

  <!-- "Regtransfers.co.uk" main wordmark -->
  <text x="196" y="42" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="26" fill="#1a3060" font-weight="900" letter-spacing="-0.5">Regtransfers.co.uk</text>

  <!-- "PERSONAL NUMBER PLATES" tagline -->
  <text x="196" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a3060" font-weight="bold" letter-spacing="2.5">PERSONAL NUMBER PLATES</text>
</svg>
