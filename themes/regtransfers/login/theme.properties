parent=keycloak
import=common/keycloak

# Stylesheets — parent styles first, then our overrides
styles=css/login.css css/regtransfers.css

# Page / layout classes
kcHtmlClass=login-pf
kcBodyClass=login-pf
kcLoginClass=login-pf-page
kcContentWrapperClass=row
kcHeaderClass=login-pf-header
kcHeaderWrapperClass=kc-logo-text

# Form layout
kcFormAreaClass=col-sm-10 col-sm-offset-1 col-md-6 col-md-offset-3 col-lg-6 col-lg-offset-3
kcFormCardClass=card-pf
kcFormCardAccountClass=login-pf-page-account
kcFormHeaderClass=login-pf-header-account
kcFormGroupClass=form-group

# Labels & inputs
kcLabelClass=pf-c-form__label
kcLabelWrapperClass=col-xs-12 col-sm-12 col-md-12 col-lg-12
kcInputClass=pf-c-form-control
kcInputWrapperClass=col-xs-12 col-sm-12 col-md-12 col-lg-12
kcInputHelperTextBeforeClass=pf-c-form__helper-text pf-m-inactive
kcInputHelperTextAfterClass=pf-c-form__helper-text pf-m-inactive

# Buttons
kcFormButtonsClass=col-xs-12 col-sm-12 col-md-12 col-lg-12
kcButtonClass=pf-c-button
kcButtonPrimaryClass=pf-m-primary
kcButtonDefaultClass=pf-m-secondary
kcButtonLargeClass=pf-m-block
kcButtonBlockClass=pf-m-block

# Social / IdP
kcSocialProviderListClass=kc-social-providers
kcSocialProviderListItemClass=
kcSocialProviderListItemIconClass=kc-social-item-icon
kcSocialProviderListButtonClass=kc-social-item-link

# Icons for common IdPs
kcCommonLogoIdP-google=kc-google
kcCommonLogoIdP-facebook=kc-facebook
kcCommonLogoIdP-github=kc-github
kcCommonLogoIdP-microsoft=kc-microsoft

# Locale
kcLocaleMainClass=login-pf-locale

# Alerts
kcAlertIconClasserror=pficon pficon-error-circle-o
kcAlertIconClasswarning=pficon pficon-warning-triangle-o
kcAlertIconClasssuccess=pficon pficon-ok
kcAlertIconClassinfo=pficon pficon-info

# Sign-up / info area
kcSignUpClass=login-pf-signup
kcInfoAreaClass=col-xs-12 col-sm-4 col-md-4

# Misc
kcFormSettingClass=login-pf-settings
kcTextareaClass=form-control
